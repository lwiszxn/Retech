<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Retech</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <a href="teladelogin.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        
        <form id="recuperarForm">
            <img src="img/logo.png" alt="Logo RETECH" class="logo">
            <h2>Recuperar Senha</h2>
            
            <p style="text-align: center; color: var(--text-muted); margin-bottom: 20px; font-size: 0.9em;">
                Informe seu CPF cadastrado para definir uma nova senha.
            </p>
            
            <div class="input-group">
                <i class="fas fa-id-card"></i>
                <input type="text" id="cpf" placeholder="CPF cadastrado" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="novaSenha" placeholder="Nova Senha" required>
            </div>
            
            <button type="submit">Redefinir Senha</button>
        </form>
    </div>

    <script src="utils.js"></script>
    <script src="recuperar.js"></script>
</body>
</html>
